<!doctype html>
<html lang="en">
    <head>
        <title>Pd4Web</title>
        <meta charset="UTF-8" />
        <!-- WebApp manifest -->
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#000000" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
        <link rel="apple-touch-icon" href="icon-192.png" />
        <meta name="mobile-web-app-capable" content="yes" />
        <!-- Unregister any stale caching service worker FIRST -->
        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    registrations.forEach(function(reg) {
                        if (reg.active && reg.active.scriptURL.includes('pd4web.sw.js')) {
                            reg.unregister().then(function() {
                                console.log('[cleanup] Unregistered stale pd4web.sw.js');
                                if ('caches' in window) {
                                    caches.delete('webpatch-cache-v1').then(function() {
                                        console.log('[cleanup] Deleted webpatch-cache-v1');
                                    });
                                }
                            });
                        }
                    });
                });
            }
        </script>
        <!-- Always BEFORE pd4web.js (it updates COI) -->
        <script src="./pd4web.threads.js"></script>
        <!-- Main modules -->
        <script src="./pd4web.js"></script>
        <script src="./geolocation.js"></script>
        <script src="./gps_pd_bridge.js"></script>
        <!-- TensorFlow.js (required by ai-classifier-bridge.js for YAMNet in zones 32-35) -->
        <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
        <script src="./ai-classifier-bridge.js"></script>
        <style>
            @media (prefers-color-scheme: light) {
                :root {
                    --bg: rgb(255, 255, 255);
                    --fg: rgba(0, 0, 0, 0.9);
                }
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --bg: rgb(48, 48, 48);
                    --fg: rgba(255, 255, 255, 0.9);

                    .pd4web-sound-switch {
                        filter: invert(1);
                    }
                }
            }

            body {
                font-size: 10px;
                touch-action: pan-x pan-y;
                background-color: var(--bg);
            }

            span {
                color: var(--fg);
            }

            #wasm-loader {
                position: fixed;
                top: 10px;
                left: 50%;
                transform: translate(-50%, -50%);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 200px;
                padding: 8px;
                border-radius: 5px;
                background-color: rgba(0, 0, 0, 0.05);
                box-shadow:
                    rgba(14, 30, 37, 0.12) 0px 2px 4px 0px,
                    rgba(14, 30, 37, 0.32) 0px 2px 16px 0px;
            }

            #status {
                font-size: 10px;
                text-align: center;
                margin-bottom: 4px;
                color: var(--fg);
            }

            #progress {
                width: 150px;
                height: 8px;
                border-radius: 4px;
            }

            .pd4web-patch-canvas {
                tabindex: 0;
                margin: 10px auto;
                display: flex;
                border-radius: 5px;
                box-shadow:
                    rgba(14, 30, 37, 0.12) 0px 2px 4px 0px,
                    rgba(14, 30, 37, 0.32) 0px 2px 16px 0px;
            }

            .pd4web-patch-canvas:focus {
                box-shadow:
                    rgba(100, 30, 37, 0.12) 0px 2px 4px 0px,
                    rgba(100, 30, 37, 0.32) 0px 2px 16px 0px;
                outline: none;
            }

            .pd4web-sound-switch {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 25px;
                height: 25px;
                margin: 0 auto;
                transform: none;
            }

            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }

            @keyframes pulse {
                0% { transform: scale(1); }
                50% { transform: scale(1.2); }
                100% { transform: scale(1); }
            }
            .pulse-icon {
                animation: pulse 1s infinite;
            }
        </style>
    </head>
    <body>
        <div id="wasm-loader" style="text-align: center; margin: 10px">
            <span id="status">Loading...</span>
            <progress id="progress" value="0" max="100" style="width: 300px"></progress>
        </div>

        <span class="pd4web-sound-switch" id="Pd4WebAudioSwitch"></span>
        <canvas tabindex="0" class="pd4web-patch-canvas" id="Pd4WebCanvas"></canvas>
        <script>
            const statusElement = document.getElementById("status");
            const progressElement = document.getElementById("progress");
            function fetchWithProgress(url, label) {
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open("GET", url, true);
                    xhr.responseType = "arraybuffer";
                    xhr.onprogress = (event) => {
                        if (event.lengthComputable) {
                            const percent = Math.floor((event.loaded / event.total) * 100);
                            progressElement.value = percent;
                            statusElement.textContent = label + " " + percent + "%";
                        }
                    };
                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            resolve(xhr.response);
                        } else {
                            reject(new Error("Failed to load " + url + ", status " + xhr.status));
                        }
                    };
                    xhr.onerror = () => reject(new Error("Network error loading " + url));
                    xhr.send();
                });
            }
        </script>

        <script>
            fetchWithProgress("./pd4web.wasm", "Downloading engine...")
                .then((wasmBuffer) => {
                    statusElement.textContent = "Initializing...";
                    progressElement.removeAttribute("value");
                    Pd4WebModule({ wasmBinary: wasmBuffer }).then((Pd4WebModulePromise) => {
                        const Pd4Web = new Pd4WebModulePromise.Pd4Web();

                        // Expose globally so ai-classifier-bridge.js can find it
                        window.Pd4WebInstance = Pd4Web;

                        Pd4Web.openPatch("index.pd", {
                            canvasId: "Pd4WebCanvas",
                            soundToggleId: "Pd4WebAudioSwitch",
                        });

                        // Start GPS → Pd bridge (sends zone, family)
                        startGpsBridge(Pd4Web);

                        // Start AI classifier once at startup (uses pd4web's existing
                        // AudioContext and mic stream — no second AudioContext on iOS).
                        // The classifier's onaudioprocess zone-gates classification
                        // to zones 32–35 internally, so it is safe to start early.
                        if (window.AiClassifierBridge) {
                            window.AiClassifierBridge.start().catch(function (err) {
                                console.warn('[AiClassifierBridge] startup start() failed:', err);
                            });
                        }

                        const wasmLoader = document.getElementById("wasm-loader");
                        statusElement.style.display = "none";
                        progressElement.style.display = "none";
                        wasmLoader.style.display = "none";
                    });
                })
                .catch((err) => {
                    statusElement.textContent = "Failed to load WASM.";
                    console.error(err);
                });
        </script>
    </body>
</html>
